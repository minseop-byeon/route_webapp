<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f7f7;
      color: #111;
    }
    .card {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
    }
    img {
      display: block;
      width: 320px;
      height: 320px;
      margin: 16px auto;
      border: 1px solid #ddd;
      background: #fff;
    }
    code, textarea {
      font-family: Consolas, monospace;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: vertical;
    }
    .hint {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>QR 테스트 예시</h1>
    <p>아래 QR은 현재 앱이 읽는 형식인 <code>RT1|이름^주소|이름^주소</code> 규격입니다.</p>
    <img
      alt="QR example"
      src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=RT1%7C%EB%B3%80%EB%AF%BC%EC%84%AD%5E%EC%84%9C%EC%9A%B8%20%EB%A7%88%ED%8F%AC%EA%B5%AC%20%EC%84%B1%EC%95%94%EB%A1%9C%2028%7C%EA%B9%80%EA%B8%B8%EB%A6%AC%5E%EC%84%9C%EC%9A%B8%20%EC%86%A1%ED%8C%8C%EA%B5%AC%20%EA%B0%95%EB%8F%99%EB%8C%80%EB%A1%9C%2059">
    <p class="hint">QR이 보이지 않으면 아래 본문 문자열을 별도 QR 생성기에 넣어도 됩니다.</p>
    <textarea readonly>RT1|변민섭^서울 마포구 성암로 28|김길리^서울 송파구 강동대로 59</textarea>
  </div>
</body>
</html>
