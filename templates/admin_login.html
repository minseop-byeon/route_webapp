<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    body {
      font-family: Pretendard, sans-serif;
      background: #f4f6fa;
      margin: 0;
      color: #111827;
    }
    .wrap {
      max-width: 420px;
      margin: 60px auto;
      padding: 0 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
    }
    h1 {
      margin: 0 0 14px;
      font-size: 22px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px;
      background: #1d4ed8;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }
    .msg {
      margin-bottom: 12px;
      font-size: 13px;
      color: #dc2626;
    }
    .back {
      display: inline-block;
      margin-top: 12px;
      font-size: 13px;
      color: #374151;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>관리자 설정 로그인</h1>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="msg">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}

      <form method="POST">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">입장하기</button>
      </form>

      <a href="/" class="back">← 시작 화면으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
