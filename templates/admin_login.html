<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/symbol.png') }}">
  <title>관리자 로그인</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    :root { --mobile-top-safe:calc(env(safe-area-inset-top, 0px) + 18px); }
    * { box-sizing: border-box; }

    body {
      font-family: Pretendard, sans-serif;
      background: #f4f6fa;
      margin: 0;
      color: #111827;
      min-height: 100dvh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--mobile-top-safe);
      background: linear-gradient(180deg, rgba(244,246,250,.98) 0%, rgba(244,246,250,.88) 72%, rgba(244,246,250,0) 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
      z-index: 1200;
      opacity: 0;
    }

    .container {
      max-width: 440px;
      margin: 0 auto;
      padding: 28px 14px 0;
    }

    .hero {
      text-align: center;
      margin-bottom: 12px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 14px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.05);
    }

    .title {
      margin: 0 0 14px;
      font-size: 22px;
      font-weight: 850;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    input {
      padding: 9px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
      color: #111827;
      width: 100%;
      min-height: 42px;
      font-family: Pretendard, sans-serif;
    }

    input:focus {
      outline: none;
      border-color: #1d4ed8;
    }

    .btn-primary {
      border: none;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      width: 100%;
      margin-top: 16px;
      background: #1d4ed8;
      color: #fff;
    }

    .msg {
      margin-bottom: 12px;
      font-size: 13px;
      color: #dc2626;
      font-weight: 700;
    }

    .notice {
      font-size: 14px;
      color: #374151;
      line-height: 1.6;
    }

    .back {
      display: inline-block;
      margin-top: 12px;
      font-size: 13px;
      color: #374151;
      text-decoration: none;
    }

    @media (max-width:900px){
      body::before{opacity:1;}
      .container{
        margin: 0 auto;
        padding: calc(var(--mobile-top-safe) + 16px) 14px 0;
      }
      input:not([type="checkbox"]):not([type="radio"]):not([type="range"]),
      select,
      textarea{
        font-size:16px !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero"></div>

    <div class="card">
      {% if mobile_blocked %}
        <h1 class="title">관리자 설정</h1>
        <div class="notice">관리자 설정은 PC에서만 가능합니다.</div>
        <a href="/" class="back">← 시작 화면으로 돌아가기</a>
      {% else %}
        <h1 class="title">관리자 설정 로그인</h1>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="msg">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST">
          <div class="field">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required>
          </div>
          <button type="submit" class="btn-primary">입장하기</button>
        </form>

        <a href="/" class="back">← 시작 화면으로 돌아가기</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
