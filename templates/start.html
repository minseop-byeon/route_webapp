<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>국세청 체납관리단 경로 최적화</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

.container{
background:white;
width:420px;
margin:120px auto;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
width:100%;
padding:14px;
background:#007bff;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>


<body>

<div class="container">

<h1>국세청 체납관리단</h1>

<form action="/start_process" method="post">

<input type="text" name="team" placeholder="조 입력" required>

<input type="text" name="username" placeholder="사용자명 입력" required>

<input type="date" name="date" required>

<button type="submit">경로 최적화 시작하기</button>

</form>

</div>

</body>
</html>
