<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/symbol.png') }}">
<title>국세청 체납관리단 - SMART 경로탐색</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  --mobile-top-safe:calc(env(safe-area-inset-top, 0px) + 18px);
  --krds-form-select--color-background:#f8fafd;
  --krds-form-select--color-background-active:#ffffff;
  --krds-form-select--color-border:#d4dce7;
  --krds-form-select--color-border-active:#5779b4;
  --krds-form-select--color-text:#475569;
  --krds-form-select--color-text-active:#0f172a;
  --krds-form-select--color-option-selected-bg:#e7ecf3;
  --krds-form-select--color-option-selected-text:#243b63;
  --krds-form-select--color-check:#244a7c;
  --krds-calendar--radius:var(--krds-radius-xlarge2, 18px);
  --krds-calendar--head-pc-font-size:var(--krds-pc-font-size-heading-xsmall, 20px);
  --krds-calendar--head-mobile-font-size:var(--krds-mobile-font-size-heading-xsmall, 18px);
  --krds-calendar--head-btn-cal-switch-pc-font-size:var(--krds-pc-font-size-label-medium, 14px);
  --krds-calendar--head-btn-cal-switch-mobile-font-size:var(--krds-mobile-font-size-label-medium, 13px);
  --krds-calendar--head-btn-cal-switch-radius:var(--krds-radius-medium1, 10px);
  --krds-calendar--head-btn-cal-move-size:var(--krds-size-height-5, 28px);
  --krds-calendar--table-wrap-padding:var(--krds-gap-5, 12px);
  --krds-calendar--table-head-pc-font-size:var(--krds-pc-font-size-label-small, 11px);
  --krds-calendar--table-head-mobile-font-size:var(--krds-mobile-font-size-label-small, 10px);
  --krds-calendar--table-caption-pc-font-size:var(--krds-pc-font-size-heading-xxsmall, 13px);
  --krds-calendar--table-caption-mobile-font-size:var(--krds-pc-font-size-heading-xxsmall, 12px);
  --krds-calendar--set-date-radius:var(--krds-radius-max, 999px);
  --krds-calendar--color-border:var(--krds-light-color-border-secondary-light, #d6dfda);
  --krds-calendar--color-surface:var(--krds-light-color-surface-secondary-subtler, #f2f4f4);
  --krds-calendar--color-text-sub:var(--krds-light-color-text-subtle, #5b5f63);
  --krds-calendar--head-btn-cal-move-color-text-active:var(--krds-light-color-text-secondary, #4b5563);
  --krds-calendar--head-btn-cal-move-color-border:var(--krds-light-color-border-gray-light, #ccd5d0);
  --krds-calendar--head-btn-cal-move-color-border-active:var(--krds-light-color-border-secondary, #98a3ae);
  --krds-calendar--head-btn-cal-move-color-action:var(--krds-light-color-action-white, #ffffff);
  --krds-calendar--head-btn-cal-switch-color-action-hover:var(--krds-light-color-action-secondary-hover, #f1f5f9);
  --krds-calendar--head-btn-cal-switch-color-action-active:var(--krds-light-color-action-secondary-pressed, #e2e8f0);
  --krds-calendar--head-btn-cal-switch-color-text-disabled:var(--krds-light-color-text-disabled-on, #9aa6b2);
  --krds-calendar--head-drop-down-shadow:0 0 0.2rem 0 var(--krds-light-color-alpha-shadow1, rgba(15,23,42,0.08)), 0 0.4rem 0.8rem 0 var(--krds-light-color-alpha-shadow2, rgba(15,23,42,0.12));
  --krds-calendar--date-set-color-action:var(--krds-light-color-action-secondary-active, #63666a);
  --krds-calendar--date-set-color-text:var(--krds-light-color-text-inverse-static, #ffffff);
  --krds-calendar--date-set-color-text-day-off:var(--krds-light-color-text-danger, #b42318);
  --krds-calendar--date-set-color-text-day-event:var(--krds-light-color-text-information, #175cd3);
  --krds-calendar--date-set-color-text-disabled:var(--krds-light-color-text-disabled, #a7aeb6);
  --krds-calendar--date-set-color-action-pressed:var(--krds-light-color-action-secondary-on-pressed, #52565b);
  --krds-calendar--date-set-color-action-period:var(--krds-light-color-action-secondary-on-selected, #e5eaef);
  --krds-calendar--date-set-color-element-today:var(--krds-light-color-element-point, #6d737a);
  --krds-calendar--action-btn-wrap-color-border:var(--krds-light-color-divider-gray-light, #e3e8ee);
  --krds-calendar--action-btn-wrap-color-surface:var(--krds-light-color-surface-white, #ffffff);
}
*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
}

body{
  font-family:Pretendard,sans-serif;
  background:#f4f6fa;
  color:#111827;
  min-height:100vh;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:var(--mobile-top-safe);
  background:linear-gradient(180deg, rgba(244,246,250,.98) 0%, rgba(244,246,250,.88) 72%, rgba(244,246,250,0) 100%);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  pointer-events:none;
  z-index:1200;
  opacity:0;
}

.container{
  max-width:420px;
  margin:34px auto;
  padding:0 18px 28px;
}

.top-actions{
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
  padding-right:2px;
}

.admin-btn{
  font-size:12px;
  font-weight:600;
  color:#94a3b8;
  text-decoration:none;
  line-height:1;
}

.admin-btn:hover{
  color:#64748b;
  text-decoration:underline;
}

.card{
  background:#ffffff;
  border:1px solid #e2e8f0;
  border-radius:20px;
  padding:34px 24px 22px;
  box-shadow:0 10px 24px rgba(15,23,42,0.045);
}

.logo-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:10px;
}

.logo-circle{
  width:138px;
  height:138px;
  border-radius:50%;
  background:#ffffff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-circle img{
  width:124px;
  height:124px;
  object-fit:contain;
  display:block;
}

.title-wrap{
  text-align:center;
  margin-bottom:26px;
}

.main-title{
  font-size:24px;
  font-weight:850;
  letter-spacing:-0.45px;
  color:#111827;
  line-height:1.2;
}

.sub-title{
  margin-top:7px;
  font-size:13px;
  color:#64748b;
  font-weight:700;
  letter-spacing:0.25px;
}

.form-group{
  margin-bottom:15px;
}

.field{
  display:flex;
  flex-direction:column;
}

label{
  font-size:12px;
  color:#6b7280;
  margin-bottom:7px;
  font-weight:700;
}

.required::after{
  content:" *";
  color:#ef4444;
}

.select-wrap,
.date-wrap{
  position:relative;
}
.krds-form-select{
  position:relative;
}
.custom-select{
  position:relative;
}

select,
.select-trigger,
input[type="text"]{
  width:100%;
  height:48px;
  padding:0 44px 0 14px;
  border:1px solid var(--krds-form-select--color-border);
  border-radius:13px;
  background:var(--krds-form-select--color-background);
  font-size:14px;
  color:var(--krds-form-select--color-text-active);
  font-family:Pretendard,sans-serif;
  font-weight:600;
  line-height:48px;
  transition:border-color 0.15s,box-shadow 0.15s,background 0.15s;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}
.krds-form-select select{
  padding-right:52px;
}

select:focus,
.select-trigger:focus,
input[type="text"]:focus{
  outline:none;
  border-color:var(--krds-form-select--color-border-active);
  background:var(--krds-form-select--color-background-active);
  box-shadow:0 0 0 3px rgba(87,121,180,0.12);
}

.krds-form-select select:hover{
  border-color:#becadb;
  background:#ffffff;
}

.krds-form-select select option{
  font-size:14px;
  font-weight:600;
  color:#111827;
  background:#ffffff;
}

.krds-form-select::after{
  content:none;
}

.krds-form-select:focus-within::after{
  border-right-color:#4f6c9c;
  border-bottom-color:#4f6c9c;
}

.krds-form-select.completed .select-trigger{
  background:#ffffff;
  border-color:#b9c7dc;
}
.select-trigger{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  cursor:pointer;
  padding:0 44px 0 14px;
  position:relative;
}
.select-text{
  color:var(--krds-form-select--color-text-active);
}
.custom-select.placeholder .select-text{
  color:var(--krds-form-select--color-text);
}
.select-arrow{
  position:absolute;
  top:50%;
  right:16px;
  width:18px;
  height:18px;
  transform:translateY(-50%);
  display:flex;
  align-items:center;
  justify-content:center;
}
.select-arrow::before{
  content:"";
  width:8px;
  height:8px;
  border-right:2px solid #7f8ea6;
  border-bottom:2px solid #7f8ea6;
  transform:rotate(45deg);
  transition:transform 0.15s ease;
}
.custom-select.open .select-arrow{
  transform:translateY(-50%);
}
.custom-select.open .select-arrow::before{
  transform:rotate(225deg);
}
.select-menu{
  position:absolute;
  top:calc(100% + 6px);
  left:0;
  right:0;
  margin:0;
  padding:6px;
  list-style:none;
  border:1px solid var(--krds-form-select--color-border);
  border-radius:8px;
  background:#f5f6f8;
  box-shadow:0 8px 18px rgba(15,23,42,0.08);
  z-index:40;
  max-height:220px;
  overflow:auto;
}
.select-option{
  width:100%;
  border:none;
  background:transparent;
  border-radius:4px;
  padding:10px 10px 10px 32px;
  font-size:14px;
  font-weight:600;
  color:#111827;
  text-align:left;
  cursor:pointer;
  position:relative;
}
.select-option:hover{
  background:#f1f5f9;
}
.select-option.selected{
  background:var(--krds-form-select--color-option-selected-bg);
  color:var(--krds-form-select--color-option-selected-text);
}
.select-option.selected::before{
  content:"";
  position:absolute;
  left:13px;
  top:50%;
  width:9px;
  height:5px;
  border-left:2px solid var(--krds-form-select--color-check);
  border-bottom:2px solid var(--krds-form-select--color-check);
  transform:translateY(-62%) rotate(-45deg);
}

.date-wrap::after{
  content:none;
}

.date-control{
  position:relative;
}

.date-control input[type="text"]{
  padding-right:52px;
  cursor:pointer;
  font-size:16px;
}

.calendar-trigger{
  position:absolute;
  top:50%;
  right:16px;
  transform:translateY(-50%);
  width:18px;
  height:18px;
  border:none;
  background:transparent;
  padding:0;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.calendar-trigger svg{
  width:18px;
  height:18px;
  stroke:#94a3b8;
  stroke-width:2;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.calendar-popover{
  position:absolute;
  top:calc(100% + 8px);
  left:0;
  width:236px;
  background:var(--krds-calendar--color-surface);
  border:1px solid var(--krds-calendar--color-border);
  border-radius:var(--krds-calendar--radius);
  padding:var(--krds-calendar--table-wrap-padding);
  z-index:30;
  box-shadow:var(--krds-calendar--head-drop-down-shadow);
}

.calendar-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:8px;
}

.calendar-title{
  font-size:var(--krds-calendar--table-caption-pc-font-size);
  font-weight:800;
  color:var(--krds-calendar--color-text-sub);
}

.calendar-nav{
  width:var(--krds-calendar--head-btn-cal-move-size);
  height:var(--krds-calendar--head-btn-cal-move-size);
  border:1px solid var(--krds-calendar--head-btn-cal-move-color-border);
  border-radius:var(--krds-calendar--head-btn-cal-switch-radius);
  background:var(--krds-calendar--head-btn-cal-move-color-action);
  color:var(--krds-calendar--head-btn-cal-move-color-text-active);
  cursor:pointer;
  font-size:var(--krds-calendar--head-btn-cal-switch-pc-font-size);
  line-height:1;
}
.calendar-nav:hover{
  background:var(--krds-calendar--head-btn-cal-switch-color-action-hover);
}
.calendar-nav:active{
  background:var(--krds-calendar--head-btn-cal-switch-color-action-active);
  border-color:var(--krds-calendar--head-btn-cal-move-color-border-active);
}

.calendar-weekdays,
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:2px;
}

.calendar-weekdays{
  margin-bottom:6px;
}

.calendar-weekday{
  text-align:center;
  font-size:var(--krds-calendar--table-head-pc-font-size);
  font-weight:700;
  color:var(--krds-calendar--color-text-sub);
  padding:2px 0;
}

.calendar-day{
  width:100%;
  height:30px;
  margin:0;
  border:none;
  border-radius:var(--krds-calendar--set-date-radius);
  background:transparent;
  font-size:12px;
  font-weight:700;
  color:#222;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.calendar-day.other-month{
  color:var(--krds-calendar--date-set-color-text-disabled);
}

.calendar-day.selected{
  background:var(--krds-calendar--date-set-color-action);
  color:var(--krds-calendar--date-set-color-text);
}
.calendar-day.selected:active{
  background:var(--krds-calendar--date-set-color-action-pressed);
}

.calendar-day.today{
  border:1px solid var(--krds-calendar--date-set-color-element-today);
  background:var(--krds-calendar--action-btn-wrap-color-surface);
}

.calendar-day:focus{
  outline:2px solid #5b9dff;
  outline-offset:1px;
}

.hidden{
  display:none;
}

.submit-btn{
  width:100%;
  margin-top:10px;
  border:none;
  border-radius:13px;
  padding:14px 16px;
  cursor:pointer;
  font-size:14px;
  font-weight:800;
  font-family:Pretendard,sans-serif;
  background:#1d4ed8;
  color:#ffffff;
  transition:background 0.15s,transform 0.15s;
}

.submit-btn:hover:enabled{
  background:#1e40af;
}

.submit-btn:disabled{
  background:#94a3b8;
  cursor:not-allowed;
}

@media (max-width:560px){
  body::before{opacity:1;}
  .container{
    margin:calc(var(--mobile-top-safe) + 16px) auto 0;
    padding:0 14px 22px;
  }

  .top-actions{
    display:none;
  }

  .card{
    padding:28px 18px 18px;
    border-radius:18px;
  }

  .logo-wrap{
    margin-bottom:10px;
  }

  .logo-circle{
    width:124px;
    height:124px;
  }

  .logo-circle img{
    width:112px;
    height:112px;
  }

  .title-wrap{
    margin-bottom:22px;
  }

  .main-title{
    font-size:22px;
  }

  .sub-title{
    font-size:12px;
  }

  select,
  input[type="text"]{
    height:46px;
    line-height:46px;
  }

  .calendar-popover{
    width:230px;
    padding:10px;
  }

  .calendar-title{
    font-size:var(--krds-calendar--table-caption-mobile-font-size);
  }

  .calendar-nav{
    font-size:var(--krds-calendar--head-btn-cal-switch-mobile-font-size);
  }

  .calendar-weekday{
    font-size:var(--krds-calendar--table-head-mobile-font-size);
  }
}

@media (max-width:900px){
  input:not([type="checkbox"]):not([type="radio"]):not([type="range"]),
  select,
  textarea{
    font-size:16px !important;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="top-actions">
    <a href="{{ url_for('admin_settings_page') if session.get('is_admin') else url_for('admin_login') }}" class="admin-btn">관리자 설정</a>
  </div>

  <div class="card">
    <div class="logo-wrap">
      <div class="logo-circle">
        <img src="{{ url_for('static', filename='images/symbol.png') }}" alt="국세청 심볼">
      </div>
    </div>

    <div class="title-wrap">
      <div class="main-title">국세청 체납관리단</div>
      <div class="sub-title">SMART WORK</div>
    </div>

    <form id="startForm" method="POST">
      <div class="form-group">
        <div class="field">
          <label class="required" for="workTypeSelect">체납관리단</label>
          <div class="select-wrap krds-form-select custom-select placeholder" id="workTypeSelectWrap">
            <button type="button" class="select-trigger" id="workTypeSelectTrigger" aria-haspopup="listbox" aria-expanded="false">
              <span class="select-text" id="workTypeSelectText">선택</span>
              <span class="select-arrow" aria-hidden="true"></span>
            </button>
            <ul class="select-menu hidden" id="workTypeSelectMenu" role="listbox">
              <li><button type="button" class="select-option selected" data-value="">선택</button></li>
              <li><button type="button" class="select-option" data-value="visit">방문</button></li>
              <li><button type="button" class="select-option" data-value="phone">전화</button></li>
            </ul>
            <input type="hidden" name="work_type" id="workTypeSelect" value="{{ work_type or '' }}">
          </div>
        </div>
      </div>

      <div class="form-group hidden" id="teamField">
        <div class="field">
          <label class="required" for="teamSelect">조</label>
          <div class="select-wrap krds-form-select custom-select placeholder" id="teamSelectWrap">
            <button type="button" class="select-trigger" id="teamSelectTrigger" aria-haspopup="listbox" aria-expanded="false">
              <span class="select-text" id="teamSelectText">선택</span>
              <span class="select-arrow" aria-hidden="true"></span>
            </button>
            <ul class="select-menu hidden" id="teamSelectMenu" role="listbox">
              <li><button type="button" class="select-option selected" data-value="">선택</button></li>
              {% for team in team_options %}
              <li><button type="button" class="select-option" data-value="{{ team }}">{{ team }}</button></li>
              {% endfor %}
            </ul>
            <input type="hidden" name="team_no" id="teamSelect">
          </div>
        </div>
      </div>

      <div class="form-group hidden" id="userField">
        <div class="field">
          <label class="required" for="userSelect">사용자</label>
          <div class="select-wrap krds-form-select custom-select placeholder" id="userSelectWrap">
            <button type="button" class="select-trigger" id="userSelectTrigger" aria-haspopup="listbox" aria-expanded="false">
              <span class="select-text" id="userSelectText">선택</span>
              <span class="select-arrow" aria-hidden="true"></span>
            </button>
            <ul class="select-menu hidden" id="userSelectMenu" role="listbox">
              <li><button type="button" class="select-option selected" data-value="">선택</button></li>
            </ul>
            <input type="hidden" name="user_name" id="userSelect">
          </div>
        </div>
      </div>

      <div class="form-group hidden" id="dateField">
        <div class="field">
          <label class="required" for="tripDate">방문일자</label>
          <div class="date-wrap">
            <div class="date-control">
              <input type="text" id="tripDateDisplay" placeholder="YYYY-MM-DD" readonly>
              <button type="button" id="calendarTrigger" class="calendar-trigger" aria-label="방문일자 달력 열기">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="3.5" y="4.5" width="17" height="16" rx="3"></rect>
                  <path d="M8 3.5v3M16 3.5v3M3.5 9.5h17"></path>
                </svg>
              </button>
              <input type="hidden" name="trip_date" id="tripDate">
              <div class="calendar-popover hidden" id="calendarPopover" aria-hidden="true">
                <div class="calendar-header">
                  <button type="button" class="calendar-nav" id="calendarPrev" aria-label="이전 달">‹</button>
                  <div class="calendar-title" id="calendarTitle"></div>
                  <button type="button" class="calendar-nav" id="calendarNext" aria-label="다음 달">›</button>
                </div>
                <div class="calendar-weekdays">
                  <span class="calendar-weekday">일</span>
                  <span class="calendar-weekday">월</span>
                  <span class="calendar-weekday">화</span>
                  <span class="calendar-weekday">수</span>
                  <span class="calendar-weekday">목</span>
                  <span class="calendar-weekday">금</span>
                  <span class="calendar-weekday">토</span>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn" disabled>시작하기</button>
    </form>
  </div>
</div>

<script>
const teamUsers = {{ team_users | tojson }};

const workTypeSelect = document.getElementById("workTypeSelect");
const workTypeSelectWrap = document.getElementById("workTypeSelectWrap");
const workTypeSelectTrigger = document.getElementById("workTypeSelectTrigger");
const workTypeSelectText = document.getElementById("workTypeSelectText");
const workTypeSelectMenu = document.getElementById("workTypeSelectMenu");
const teamSelect = document.getElementById("teamSelect");
const userSelect = document.getElementById("userSelect");
const teamSelectWrap = document.getElementById("teamSelectWrap");
const teamSelectTrigger = document.getElementById("teamSelectTrigger");
const teamSelectText = document.getElementById("teamSelectText");
const teamSelectMenu = document.getElementById("teamSelectMenu");
const userSelectWrap = document.getElementById("userSelectWrap");
const userSelectTrigger = document.getElementById("userSelectTrigger");
const userSelectText = document.getElementById("userSelectText");
const userSelectMenu = document.getElementById("userSelectMenu");
const tripDate = document.getElementById("tripDate");
const tripDateDisplay = document.getElementById("tripDateDisplay");
const dateControl = document.querySelector(".date-control");
const calendarTrigger = document.getElementById("calendarTrigger");
const calendarPopover = document.getElementById("calendarPopover");
const calendarTitle = document.getElementById("calendarTitle");
const calendarGrid = document.getElementById("calendarGrid");
const calendarPrev = document.getElementById("calendarPrev");
const calendarNext = document.getElementById("calendarNext");
const userField = document.getElementById("userField");
const dateField = document.getElementById("dateField");
const teamField = document.getElementById("teamField");
const submitBtn = document.getElementById("submitBtn");
const START_DRAFT_KEY = "route_start_draft_v1";
const START_DRAFT_STORAGE = window.localStorage;
let calendarYear = new Date().getFullYear();
let calendarMonth = new Date().getMonth();

function closeCustomSelect(menu, wrap, trigger){
  menu.classList.add("hidden");
  wrap.classList.remove("open");
  trigger.setAttribute("aria-expanded", "false");
}

function openCustomSelect(menu, wrap, trigger){
  menu.classList.remove("hidden");
  wrap.classList.add("open");
  trigger.setAttribute("aria-expanded", "true");
}

function closeAllCustomSelects(){
  closeCustomSelect(workTypeSelectMenu, workTypeSelectWrap, workTypeSelectTrigger);
  closeCustomSelect(teamSelectMenu, teamSelectWrap, teamSelectTrigger);
  closeCustomSelect(userSelectMenu, userSelectWrap, userSelectTrigger);
}

function renderUserOptions(team){
  const users = (team && teamUsers[team]) ? teamUsers[team] : [];
  const items = ['<li><button type="button" class="select-option selected" data-value="">선택</button></li>'];
  users.forEach((user) => {
    items.push(`<li><button type="button" class="select-option" data-value="${user}">${user}</button></li>`);
  });
  userSelectMenu.innerHTML = items.join("");
}

function setCustomValue(selectEl, textEl, wrapEl, menuEl, value){
  const options = menuEl.querySelectorAll(".select-option");
  let selectedText = "선택";
  options.forEach((btn) => {
    const isSelected = btn.dataset.value === value;
    btn.classList.toggle("selected", isSelected);
    if(isSelected){
      selectedText = btn.textContent;
    }
  });
  selectEl.value = value || "";
  textEl.textContent = selectedText;
  wrapEl.classList.toggle("placeholder", !value);
}

function bindCustomSelect(menuEl, wrapEl, triggerEl, onPick){
  triggerEl.addEventListener("click", function(){
    const isClosed = menuEl.classList.contains("hidden");
    closeAllCustomSelects();
    if(isClosed){
      openCustomSelect(menuEl, wrapEl, triggerEl);
    }
  });

  menuEl.addEventListener("click", function(event){
    const optionBtn = event.target.closest(".select-option");
    if(!optionBtn){
      return;
    }
    onPick(optionBtn.dataset.value || "");
    closeCustomSelect(menuEl, wrapEl, triggerEl);
  });
}

function toDateString(year, month, day){
  const y = String(year);
  const m = String(month + 1).padStart(2, "0");
  const d = String(day).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function setTripDate(value){
  tripDate.value = value || "";
  tripDateDisplay.value = value || "";
  updateSubmitState();
  saveStartDraft();
}

function openCalendar(){
  const selected = tripDate.value ? new Date(tripDate.value) : new Date();
  calendarYear = selected.getFullYear();
  calendarMonth = selected.getMonth();
  renderCalendar();
  calendarPopover.classList.remove("hidden");
  calendarPopover.setAttribute("aria-hidden", "false");
}

function closeCalendar(){
  calendarPopover.classList.add("hidden");
  calendarPopover.setAttribute("aria-hidden", "true");
}

function renderCalendar(){
  const firstDay = new Date(calendarYear, calendarMonth, 1);
  const startDay = firstDay.getDay();
  const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
  const prevMonthDays = new Date(calendarYear, calendarMonth, 0).getDate();
  const today = new Date();
  const selected = tripDate.value;

  calendarTitle.textContent = `${calendarYear}년 ${calendarMonth + 1}월`;
  calendarGrid.innerHTML = "";

  for(let i = 0; i < 42; i++){
    let dayNumber;
    let monthOffset = 0;

    if(i < startDay){
      dayNumber = prevMonthDays - startDay + i + 1;
      monthOffset = -1;
    }else if(i >= startDay + daysInMonth){
      dayNumber = i - (startDay + daysInMonth) + 1;
      monthOffset = 1;
    }else{
      dayNumber = i - startDay + 1;
    }

    const dateObj = new Date(calendarYear, calendarMonth + monthOffset, dayNumber);
    const dateStr = toDateString(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());

    const dayBtn = document.createElement("button");
    dayBtn.type = "button";
    dayBtn.className = "calendar-day";
    dayBtn.textContent = String(dayNumber);
    dayBtn.dataset.date = dateStr;
    dayBtn.setAttribute("aria-label", dateStr);

    if(monthOffset !== 0){
      dayBtn.classList.add("other-month");
    }
    if(selected && selected === dateStr){
      dayBtn.classList.add("selected");
    }
    if(
      dateObj.getFullYear() === today.getFullYear() &&
      dateObj.getMonth() === today.getMonth() &&
      dateObj.getDate() === today.getDate()
    ){
      dayBtn.classList.add("today");
    }

    dayBtn.addEventListener("click", () => {
      setTripDate(dateStr);
      closeCalendar();
    });

    calendarGrid.appendChild(dayBtn);
  }
}

function updateSubmitState(){
  const isPhoneMode = workTypeSelect.value === "phone";
  const isReady = isPhoneMode || !!(workTypeSelect.value === "visit" && teamSelect.value && userSelect.value && tripDate.value);
  submitBtn.disabled = !isReady;
}

function saveStartDraft(){
  const draft = {
    version: 1,
    savedAt: new Date().toISOString(),
    workType: workTypeSelect.value || "",
    team: teamSelect.value || "",
    user: userSelect.value || "",
    tripDate: tripDate.value || ""
  };
  START_DRAFT_STORAGE.setItem(START_DRAFT_KEY, JSON.stringify(draft));
}

function restoreStartDraft(){
  const raw = START_DRAFT_STORAGE.getItem(START_DRAFT_KEY);
  if(!raw){
    return;
  }

  let draft;
  try{
    draft = JSON.parse(raw);
  }catch{
    return;
  }

  const team = draft?.team || "";
  const user = draft?.user || "";
  const savedTripDate = draft?.tripDate || "";
  if(!team){
    return;
  }

  // Keep the first screen neutral: only restore downstream fields.
  setCustomValue(workTypeSelect, workTypeSelectText, workTypeSelectWrap, workTypeSelectMenu, "");
  workTypeSelect.dispatchEvent(new Event("change"));

  setCustomValue(teamSelect, teamSelectText, teamSelectWrap, teamSelectMenu, team);
  teamSelect.dispatchEvent(new Event("change"));

  const users = Array.isArray(teamUsers[team]) ? teamUsers[team] : [];
  if(user && users.includes(user)){
    setCustomValue(userSelect, userSelectText, userSelectWrap, userSelectMenu, user);
    userSelect.dispatchEvent(new Event("change"));
  }

  if(savedTripDate && userSelect.value){
    setTripDate(savedTripDate);
  }
}

function updateSelectCompleted(selectElement){
  const wrapper = selectElement.closest(".krds-form-select");
  if(!wrapper){
    return;
  }
  wrapper.classList.toggle("completed", !!selectElement.value);
}

workTypeSelect.addEventListener("change", function(){
  const isVisitMode = this.value === "visit";
  updateSelectCompleted(workTypeSelect);

  if(!this.value){
    teamField.classList.add("hidden");
    setCustomValue(teamSelect, teamSelectText, teamSelectWrap, teamSelectMenu, "");
    setCustomValue(userSelect, userSelectText, userSelectWrap, userSelectMenu, "");
    renderUserOptions("");
    userField.classList.add("hidden");
    dateField.classList.add("hidden");
    setTripDate("");
    updateSubmitState();
    saveStartDraft();
    return;
  }

  teamField.classList.toggle("hidden", !isVisitMode);
  userField.classList.toggle("hidden", !isVisitMode || !teamSelect.value);
  dateField.classList.toggle("hidden", !isVisitMode || !userSelect.value);
  updateSubmitState();
  saveStartDraft();
});

teamSelect.addEventListener("change", function(){
  const team = this.value;
  setCustomValue(userSelect, userSelectText, userSelectWrap, userSelectMenu, "");
  renderUserOptions("");
  updateSelectCompleted(teamSelect);
  updateSelectCompleted(userSelect);
  setTripDate("");

  if(!team || workTypeSelect.value !== "visit"){
    userField.classList.add("hidden");
    dateField.classList.add("hidden");
    updateSubmitState();
    saveStartDraft();
    return;
  }

  const users = Array.isArray(teamUsers[team]) ? teamUsers[team] : [];
  renderUserOptions(team);
  userField.classList.remove("hidden");
  if(users.length === 0){
    closeCustomSelect(userSelectMenu, userSelectWrap, userSelectTrigger);
  }
  updateSelectCompleted(teamSelect);
  updateSubmitState();
  saveStartDraft();
});

userSelect.addEventListener("change", function(){
  updateSelectCompleted(userSelect);
  setTripDate("");

  if(this.value && workTypeSelect.value === "visit"){
    dateField.classList.remove("hidden");
  }else{
    dateField.classList.add("hidden");
  }

  updateSubmitState();
  saveStartDraft();
});

tripDate.addEventListener("change", function(){
  tripDateDisplay.value = tripDate.value;
  updateSubmitState();
  saveStartDraft();
});

calendarTrigger.addEventListener("click", function(event){
  event.stopPropagation();
  closeAllCustomSelects();
  openCalendar();
});

dateControl.addEventListener("click", function(event){
  if(event.target.closest("#calendarPopover")){
    return;
  }
  closeAllCustomSelects();
  openCalendar();
});

calendarPrev.addEventListener("click", function(){
  calendarMonth -= 1;
  if(calendarMonth < 0){
    calendarMonth = 11;
    calendarYear -= 1;
  }
  renderCalendar();
});

calendarNext.addEventListener("click", function(){
  calendarMonth += 1;
  if(calendarMonth > 11){
    calendarMonth = 0;
    calendarYear += 1;
  }
  renderCalendar();
});

document.addEventListener("click", function(event){
  if(!event.target.closest(".custom-select")){
    closeAllCustomSelects();
  }
  if(!event.target.closest(".date-control")){
    closeCalendar();
  }
});

bindCustomSelect(workTypeSelectMenu, workTypeSelectWrap, workTypeSelectTrigger, (value) => {
  setCustomValue(workTypeSelect, workTypeSelectText, workTypeSelectWrap, workTypeSelectMenu, value);
  workTypeSelect.dispatchEvent(new Event("change"));
});

bindCustomSelect(teamSelectMenu, teamSelectWrap, teamSelectTrigger, (value) => {
  setCustomValue(teamSelect, teamSelectText, teamSelectWrap, teamSelectMenu, value);
  teamSelect.dispatchEvent(new Event("change"));
});

bindCustomSelect(userSelectMenu, userSelectWrap, userSelectTrigger, (value) => {
  setCustomValue(userSelect, userSelectText, userSelectWrap, userSelectMenu, value);
  userSelect.dispatchEvent(new Event("change"));
});

renderUserOptions("");
setCustomValue(workTypeSelect, workTypeSelectText, workTypeSelectWrap, workTypeSelectMenu, "");
setCustomValue(teamSelect, teamSelectText, teamSelectWrap, teamSelectMenu, "");
setCustomValue(userSelect, userSelectText, userSelectWrap, userSelectMenu, "");
updateSelectCompleted(workTypeSelect);
updateSelectCompleted(teamSelect);
updateSelectCompleted(userSelect);
restoreStartDraft();

if(!workTypeSelect.value){
  setCustomValue(workTypeSelect, workTypeSelectText, workTypeSelectWrap, workTypeSelectMenu, "{{ work_type or '' }}");
  workTypeSelect.dispatchEvent(new Event("change"));
}
</script>
</body>
</html>
