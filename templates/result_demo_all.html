<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result Demo Cases</title>
<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Pretendard,system-ui,sans-serif;background:#f3f6fb;color:#0f172a;}
.wrap{max-width:980px;margin:0 auto;padding:16px;}
.top{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.btn{display:inline-flex;align-items:center;justify-content:center;height:34px;padding:0 12px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;color:#0f172a;text-decoration:none;font-size:13px;font-weight:700;}
.btn.active{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}
.links{margin-bottom:10px;font-size:12px;color:#475569;}
.links a{color:#2563eb;text-decoration:none;margin-right:10px;}
.viewer{width:100%;height:86vh;border:1px solid #dbe5f0;border-radius:12px;background:#fff;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      {% for item in cases %}
        <a class="btn{% if item.id == selected_case %} active{% endif %}" href="{{ url_for('result_demo_all_page', case=item.id) }}">{{ item.label }}</a>
      {% endfor %}
    </div>
    <div class="links">
      {% for item in cases %}
        <a href="{{ url_for('result_demo_page', case=item.id) }}" target="_blank" rel="noopener noreferrer">새 탭: {{ item.label }}</a>
      {% endfor %}
    </div>
    <iframe class="viewer" src="{{ url_for('result_demo_page', case=selected_case) }}" title="result demo"></iframe>
  </div>
</body>
</html>
