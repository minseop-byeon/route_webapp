<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/symbol.png') }}">
<title>국세청 체납관리단 - SMART 경로탐색</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  font-family:Pretendard,sans-serif;
  background:#f4f6fa;
  margin:0;
  color:#111827;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:0 18px 32px;
}

.header-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  margin-bottom:18px;
  padding-left:0;
}

.header-left{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  flex:1 1 auto;
  margin-left:-4px;
}

.header-logo{
  width:64px;
  height:64px;
  object-fit:contain;
  flex:0 0 auto;
  display:block;
}

.header-text{
  min-width:0;
}

.header-title{
  font-size:23px;
  font-weight:800;
  letter-spacing:-0.5px;
  line-height:1.05;
  white-space:nowrap;
}


.header-sub{
  font-size:13px;
  color:#5b6b7f;
  margin-top:4px;
  font-weight:700;
  line-height:1.15;
  letter-spacing:-0.1px;
}


.profile-chip{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:center;
  gap:3px;
  padding:2px 0 0 0;
  background:transparent;
  border:none;
  box-shadow:none;
  flex:0 0 auto;
  max-width:220px;
  min-height:64px;
}


.profile-top{
  font-size:14px;
  font-weight:700;
  color:#0f172a;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:210px;
  letter-spacing:-0.2px;
}


.profile-bottom{
  font-size:12px;
  font-weight:600;
  color:#64748b;
  white-space:nowrap;
  letter-spacing:-0.1px;
}


.card{
  position:relative;
  background:white;
  border-radius:14px;
  padding:18px;
  margin-bottom:14px;
  border:1px solid #e2e8f0;
  box-shadow:0 6px 14px rgba(15,23,42,0.05);
}

.card h3{
  margin:0 0 12px 0;
  font-size:14px;
  font-weight:800;
  color:#0f172a;
  letter-spacing:-0.15px;
}


.grid-main{
  display:grid;
  grid-template-columns:1fr 2fr 150px;
  gap:12px;
  align-items:end;
}

.field{
  display:flex;
  flex-direction:column;
}

label{
  font-size:12px;
  color:#6b7280;
  margin-bottom:6px;
  font-weight:600;
  letter-spacing:-0.1px;
}


.required::after{
  content:" *";
  color:#ef4444;
}

input,select{
  padding:10px 12px;
  border:1px solid #e5e7eb;
  border-radius:10px;
  font-size:14px;
  font-weight:500;
  transition:0.15s;
  background:#fff;
  min-height:42px;
  font-family:Pretendard,sans-serif;
  letter-spacing:-0.1px;
}


input:focus,select:focus{
  outline:none;
  border-color:#1d4ed8;
}

input.error, select.error{
  border-color:#ef4444 !important;
}

.address-row{
  display:flex;
  gap:6px;
}

.address-row input{
  flex:1;
  pointer-events:none;
  background:#f9fafb;
}

.ocr-page-btn{
  display:none;
}

.ocr-page-btn.show{
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

button{
  border:none;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  font-size:14px;
  font-weight:700;
  font-family:Pretendard,sans-serif;
  letter-spacing:-0.1px;
}


.btn-secondary{
  background:#eef0f4;
  color:#0f172a;
}

.btn-primary{
  background:#1d4ed8;
  color:#fff;
}

.add-btn{
  width:100%;
  margin-top:10px;
}

.submit-btn{
  width:100%;
  margin-top:18px;
  padding:13px;
}

.delete-icon{
  position:absolute;
  top:12px;
  right:14px;
  font-size:18px;
  color:#9ca3af;
  cursor:pointer;
  transition:0.2s;
  user-select:none;
}

.delete-icon:hover{
  color:#ef4444;
  transform:scale(1.2);
}

.appointment-box{
  margin-top:14px;
  font-size:13px;
  color:#374151;
}

.appointment-check{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:700;
  color:#475569;
  margin:0;
}

.appointment-check input[type="checkbox"]{
  width:auto;
  min-height:auto;
  padding:0;
  margin:0;
}

.time-select-area{
  margin-top:10px;
  display:none;
}

.time-row{
  display:flex;
  gap:8px;
}

.warning{
  margin-top:12px;
  font-size:13px;
  color:#ef4444;
  display:none;
  font-weight:800;
}

.bottom-actions{
  margin-top:18px;
  display:flex;
  justify-content:flex-start;
}

.back-link{
  display:inline-flex;
  align-items:center;
  gap:8px;
  border:1px solid #dbe2ea;
  background:#fff;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  font-size:13px;
  font-weight:800;
  color:#0f172a;
}

.back-link svg{
  width:15px;
  height:15px;
  flex:0 0 auto;
}

.loading-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.92);
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
}

.loading-box{
  text-align:center;
}

.spinner{
  width:44px;
  height:44px;
  border:4px solid #e5e7eb;
  border-top:4px solid #1d4ed8;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto 16px;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.loading-text{
  font-size:16px;
  font-weight:800;
  color:#0f172a;
}

.ocr-modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,0.46);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10000;
  padding:18px;
}

.ocr-modal.show{
  display:flex;
}

.ocr-modal-card{
  width:min(100%, 560px);
  background:#fff;
  border-radius:18px;
  padding:18px;
  border:1px solid #dbe2ea;
  box-shadow:0 24px 50px rgba(15,23,42,0.18);
}

.ocr-modal-title{
  margin:0;
  font-size:18px;
  font-weight:850;
  color:#0f172a;
}

.ocr-modal-desc{
  margin:8px 0 14px;
  font-size:13px;
  color:#64748b;
  font-weight:600;
  line-height:1.5;
}

.ocr-manual-label{
  display:block;
  margin:0 0 6px;
  font-size:12px;
  color:#6b7280;
  font-weight:700;
}

.ocr-manual-input{
  width:100%;
  min-height:180px;
  padding:10px 12px;
  border:1px solid #dbe2ea;
  border-radius:12px;
  font-size:14px;
  font-family:Pretendard,sans-serif;
  line-height:1.5;
  resize:vertical;
}

.ocr-manual-input:focus{
  outline:none;
  border-color:#1d4ed8;
}

.ocr-guide{
  margin:0 0 10px;
  font-size:12px;
  color:#64748b;
  line-height:1.5;
  font-weight:600;
}

.ocr-modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-top:14px;
}

@media (max-width:760px){
  .container{
    margin:24px auto;
    padding:0 14px 26px;
  }

  .header-row{
    align-items:flex-start;
    gap:10px;
  }

  .header-left{
    align-items:center;
    gap:8px;
    margin-left:0;
    min-width:0;
  }

  .header-logo{
    width:56px;
    height:56px;
  }

  .header-title{
    font-size:18px;
    white-space:nowrap;
  }

  .header-sub{
    font-size:11px;
    margin-top:2px;
  }

  .profile-chip{
    padding:8px 10px;
    border-radius:14px;
    max-width:154px;
  }

  .profile-top{
    font-size:12px;
    max-width:132px;
  }

  .profile-bottom{
    font-size:10px;
  }

  .grid-main{
    grid-template-columns:1fr;
  }

  .address-row{
    flex-direction:column;
  }

  .address-actions{
    width:100%;
    flex-direction:column;
  }

  .address-actions button{
    width:100%;
  }

  .time-row{
    flex-direction:column;
  }
}

@media (max-width:760px){
  .header-title{font-size:18px;white-space:nowrap;}
  .profile-chip{padding:0;max-width:154px;min-height:56px;}
  .profile-top{font-size:12px;max-width:154px;}
  .profile-bottom{font-size:10px;}
}

</style>

<body>
<div class="container">

  <div class="header-row">
    <div class="header-left">
      <img class="header-logo" src="{{ url_for('static', filename='images/symbol.png') }}" alt="국세청 심볼">
      <div class="header-text">
        <div class="header-title">국세청 체납관리단</div>
        <div class="header-sub">SMART 경로탐색</div>
      </div>
    </div>

    <div class="profile-chip" aria-label="사용자 정보">
      <div class="profile-top">{{ user_name }}({{ team_no }})</div>
      <div class="profile-bottom">{{ trip_date|replace('-', '.') }}</div>
    </div>
  </div>

  <form id="routeForm" method="POST" action="/planner">
    <div id="visits"></div>

    <button type="button" class="btn-secondary add-btn" onclick="addVisit()">+ 체납자 추가</button>
    <button type="submit" class="btn-primary submit-btn" id="submitBtn">최적 경로 계산</button>
  </form>

  <div class="bottom-actions">
    <button type="button" class="back-link" onclick="location.href='/'">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M15 18L9 12L15 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
      시작화면으로 이동
    </button>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-text">최적 경로를 계산하고 있습니다.</div>
  </div>
</div>

<input type="file" id="ocrCameraInput" accept="image/*" capture="environment" hidden style="display:none" tabindex="-1" aria-hidden="true">
<input type="file" id="ocrGalleryInput" accept="image/*" hidden style="display:none" tabindex="-1" aria-hidden="true">

<div class="ocr-modal" id="ocrConfirmModal">
  <div class="ocr-modal-card">
    <h3 class="ocr-modal-title">주소 목록 확인</h3>
    <p class="ocr-modal-desc">문서 사진에서 읽은 주소 목록입니다. 적용 전에 주소를 확인하고 필요하면 수정해 주세요.</p>
    <p class="ocr-guide">한 줄에 주소 하나씩 입력합니다. 적용하면 기존 카드 주소는 모두 지워지고, 위에서부터 순서대로 새 목록으로 채워집니다.</p>
    <label class="ocr-manual-label" for="ocrAddressList">주소 목록</label>
    <textarea id="ocrAddressList" class="ocr-manual-input" placeholder="한 줄에 주소 하나씩 입력하세요."></textarea>
    <div class="ocr-modal-actions">
      <button type="button" class="btn-secondary" id="ocrCancelBtn">취소</button>
      <button type="button" class="btn-primary" id="ocrApplyBtn">주소 적용</button>
    </div>
  </div>
</div>

<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
let visitContainer = document.getElementById("visits");
let form = document.getElementById("routeForm");
let count = 0;
const DRAFT_KEY = "route_visit_draft_v5";
const ocrPageBtn = document.getElementById("ocrPageBtn");
const ocrGalleryBtn = document.getElementById("ocrGalleryBtn");
const ocrCameraInput = document.getElementById("ocrCameraInput");
const ocrGalleryInput = document.getElementById("ocrGalleryInput");
const ocrConfirmModal = document.getElementById("ocrConfirmModal");
const ocrAddressList = document.getElementById("ocrAddressList");
const ocrCancelBtn = document.getElementById("ocrCancelBtn");
const ocrApplyBtn = document.getElementById("ocrApplyBtn");
const isMobileClient = window.matchMedia("(max-width: 760px)").matches || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

function normalizeOcrText(text){
  return (text || "")
    .replace(/\r/g, "\n")
    .replace(/[|]/g, " ")
    .replace(/[()\[\]{}]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function collectAddressCandidates(text){
  const normalized = normalizeOcrText(text);
  if(!normalized){
    return [];
  }

  const lines = text
    .split(/\n+/)
    .map(line => normalizeOcrText(line))
    .filter(Boolean);

  const source = Array.from(new Set([normalized, ...lines]));
  const patterns = [
    /(?:서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주)[^,\n]{4,80}?(?:로|길|대로)\s*\d[\d\-]*/g,
    /(?:[가-힣]+(?:시|도)\s+)?[가-힣]+(?:시|군|구)\s+[가-힣0-9]+(?:로|길|대로)\s*\d[\d\-]*/g,
    /[가-힣0-9]+(?:로|길|대로)\s*\d[\d\-]*(?:\s*[가-힣A-Za-z0-9]+){0,3}/g
  ];

  const candidates = [];
  source.forEach(item => {
    patterns.forEach(pattern => {
      const matches = item.match(pattern) || [];
      matches.forEach(match => {
        const candidate = match.replace(/\s+/g, " ").trim();
        if(candidate.length >= 6){
          candidates.push(candidate);
        }
      });
    });
  });

  return Array.from(new Set(candidates));
}

function parseAddressList(text){
  return (text || "")
    .split(/\n+/)
    .map(line => normalizeOcrText(line))
    .filter(Boolean);
}

function collectAddressLikeLines(text){
  return parseAddressList(text).filter(line => {
    if(!/[\uAC00-\uD7A3]/.test(line) || !/\d/.test(line)){
      return false;
    }
    if(/(?:\uB85C|\uAE38|\uB300\uB85C)\s*\d/.test(line)){
      return true;
    }
    return /^[\uAC00-\uD7A3\s\d-]{6,}$/.test(line);
  });
}

function getAddressInputs(){
  return Array.from(document.querySelectorAll('input[name="address"]'));
}

function ensureVisitCount(requiredCount){
  while(document.querySelectorAll(".card").length < requiredCount){
    addVisit();
  }
}

function applyOcrAddresses(addresses){
  ensureVisitCount(addresses.length);

  const addressInputs = getAddressInputs();
  addressInputs.forEach((input, index) => {
    input.value = addresses[index] || "";
    input.classList.remove("error");
    clearWarning(input.closest(".card"));
  });

  saveDraft();
}

function openOcrModal(addresses){
  ocrAddressList.value = addresses.join("\n");
  ocrConfirmModal.classList.add("show");
  ocrAddressList.focus();
  ocrAddressList.setSelectionRange(0, ocrAddressList.value.length);
}

function closeOcrModal(){
  ocrConfirmModal.classList.remove("show");
  ocrAddressList.value = "";
}

async function runOcrForFile(file){
  if(typeof Tesseract === "undefined"){
    throw new Error("OCR 라이브러리를 불러오지 못했습니다.");
  }

  const result = await Tesseract.recognize(file, "kor+eng", {
    logger: () => {}
  });
  return (result?.data?.text || "").trim();
}

function loadImageFromFile(file){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const image = new Image();
    image.onload = () => {
      URL.revokeObjectURL(url);
      resolve(image);
    };
    image.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error("촬영 이미지를 불러오지 못했습니다."));
    };
    image.src = url;
  });
}

function rotateImageToBlob(image, angle){
  return new Promise((resolve, reject) => {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    if(!ctx){
      reject(new Error("이미지 회전을 준비하지 못했습니다."));
      return;
    }

    const normalized = ((angle % 360) + 360) % 360;
    const swapAxis = normalized === 90 || normalized === 270;
    const rawWidth = swapAxis ? image.height : image.width;
    const rawHeight = swapAxis ? image.width : image.height;
    const maxEdge = 1800;
    const scale = Math.min(1, maxEdge / Math.max(rawWidth, rawHeight));
    canvas.width = Math.max(1, Math.round(rawWidth * scale));
    canvas.height = Math.max(1, Math.round(rawHeight * scale));

    ctx.save();
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    if(normalized === 90){
      ctx.translate(canvas.width, 0);
      ctx.rotate(Math.PI / 2);
    }else if(normalized === 180){
      ctx.translate(canvas.width, canvas.height);
      ctx.rotate(Math.PI);
    }else if(normalized === 270){
      ctx.translate(0, canvas.height);
      ctx.rotate(-Math.PI / 2);
    }
    ctx.drawImage(image, 0, 0, image.width * scale, image.height * scale);
    ctx.restore();

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    for(let i = 0; i < data.length; i += 4){
      const gray = Math.round((data[i] * 0.299) + (data[i + 1] * 0.587) + (data[i + 2] * 0.114));
      const boosted = gray > 185 ? 255 : Math.max(0, gray - 10);
      data[i] = boosted;
      data[i + 1] = boosted;
      data[i + 2] = boosted;
    }
    ctx.putImageData(imageData, 0, 0);

    canvas.toBlob((blob) => {
      if(blob){
        resolve(blob);
      }else{
        reject(new Error("회전 이미지를 만들지 못했습니다."));
      }
    }, "image/jpeg", 0.92);
  });
}

function scoreOcrText(text){
  const candidates = collectAddressCandidates(text);
  const lines = parseAddressList(text);
  const addressLikeLines = collectAddressLikeLines(text);
  return {
    text,
    candidates,
    lines,
    addressLikeLines,
    score: (candidates.length * 1000) + (addressLikeLines.length * 200) + (lines.length * 10) + text.length
  };
}

async function runBestOcrForFile(file){
  const image = await loadImageFromFile(file);
  const attempts = [];

  for(const angle of [0, 90, 270]){
    const source = angle === 0 ? file : await rotateImageToBlob(image, angle);
    const text = await runOcrForFile(source);
    attempts.push(scoreOcrText(text));
  }

  attempts.sort((a, b) => b.score - a.score);
  return attempts[0] || scoreOcrText("");
}

async function requestServerOcr(file){
  const formData = new FormData();
  formData.append("image", file);

  const response = await fetch("/planner/ocr-addresses", {
    method: "POST",
    body: formData
  });

  let payload = {};
  try{
    payload = await response.json();
  }catch(error){
    payload = {};
  }

  if(!response.ok || !payload.success){
    throw new Error(payload.message || "서버 OCR 처리 중 오류가 발생했습니다.");
  }

  return payload;
}

function openOcrCapture(){
  if(!isMobileClient){
    return;
  }
  ocrCameraInput.value = "";
  ocrCameraInput.click();
}

function openOcrGallery(){
  if(!isMobileClient){
    return;
  }
  ocrGalleryInput.value = "";
  ocrGalleryInput.click();
}

function refreshOcrButtons(){
  if(ocrPageBtn){
    ocrPageBtn.classList.toggle("show", isMobileClient);
  }
  if(ocrGalleryBtn){
    ocrGalleryBtn.classList.toggle("show", isMobileClient);
  }
  if(ocrCameraInput){
    ocrCameraInput.disabled = !isMobileClient;
  }
  if(ocrGalleryInput){
    ocrGalleryInput.disabled = !isMobileClient;
  }
}

function generateServiceOptions(){
  let options = "";
  for(let i=5;i<=60;i+=5){
    options += `<option value="${i}">${i}분</option>`;
  }
  return options;
}

function generateHourOptions(){
  let options = `<option value="">시</option>`;
  for(let i=10;i<=17;i++){
    options += `<option value="${i}">${i}시</option>`;
  }
  return options;
}

function generateMinuteOptions(){
  let options = `<option value="">분</option>`;
  for(let i=0;i<60;i+=5){
    const v = i.toString().padStart(2, "0");
    options += `<option value="${v}">${v}분</option>`;
  }
  return options;
}

function addVisit(){
  count = visitContainer.children.length + 1;

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div class="delete-icon" onclick="removeVisit(this)">✕</div>

    <h3>체납자 ${count}</h3>

    <div class="grid-main">
      <div class="field">
        <label class="required">성명</label>
        <input type="text" name="name">
      </div>

      <div class="field">
        <label class="required">주소</label>
        <div class="address-row">
          <input type="text" name="address" readonly tabindex="0">
          <button type="button" class="btn-secondary" onclick="openAddress(this)">검색</button>
        </div>
      </div>

      <div class="field">
        <label>방문 소요 시간</label>
        <select name="service_time">
          ${generateServiceOptions()}
        </select>
      </div>
    </div>

    <div class="appointment-box">
      <input type="hidden" name="has_appointment_flag" value="0">

      <label class="appointment-check">
        <input type="checkbox" class="appointment-toggle" onchange="toggleTime(this)">
        체납자와 방문 약속 시간 지정하기
      </label>

      <div class="time-select-area">
        <div class="time-row">
          <select name="visit_hour">${generateHourOptions()}</select>
          <select name="visit_minute">${generateMinuteOptions()}</select>
        </div>
      </div>
    </div>

    <div class="warning">입력되지 않은 항목이 있습니다</div>
  `;

  visitContainer.appendChild(div);
  bindDraftEvents(div);
  updateDeleteButtons();
  saveDraft();
}

function removeVisit(el){
  el.closest(".card").remove();
  renumber();
  updateDeleteButtons();
  saveDraft();
}

function renumber(){
  const cards = document.querySelectorAll(".card");
  count = cards.length;
  cards.forEach((card, idx) => {
    card.querySelector("h3").innerText = "체납자 " + (idx + 1);
  });
}

function updateDeleteButtons(){
  const cards = document.querySelectorAll(".card");
  cards.forEach(card => {
    const btn = card.querySelector(".delete-icon");
    btn.style.display = (cards.length === 1) ? "none" : "block";
  });
}

function toggleTime(cb){
  const card = cb.closest(".card");
  const box = cb.closest(".appointment-box");
  const timeArea = box.querySelector(".time-select-area");
  const hiddenFlag = box.querySelector('input[name="has_appointment_flag"]');
  const hourEl = box.querySelector('select[name="visit_hour"]');
  const minuteEl = box.querySelector('select[name="visit_minute"]');

  if(cb.checked){
    timeArea.style.display = "block";
    hiddenFlag.value = "1";
  }else{
    timeArea.style.display = "none";
    hiddenFlag.value = "0";
    hourEl.value = "";
    minuteEl.value = "";
    hourEl.classList.remove("error");
    minuteEl.classList.remove("error");
    clearWarning(card);
  }

  saveDraft();
}

function openAddressField(input){
  if(!input || input.dataset.addressPopupOpen === "1"){
    return;
  }

  input.dataset.addressPopupOpen = "1";

  new daum.Postcode({
    oncomplete: function(data){
      input.value = data.address;
      input.classList.remove("error");
      clearWarning(input.closest(".card"));
      saveDraft();
      input.dataset.addressPopupOpen = "0";
      input.blur();
    },
    onclose: function(){
      input.dataset.addressPopupOpen = "0";
    }
  }).open();
}

function openAddress(button){
  const input = button.parentElement.querySelector('input[name="address"]');
  openAddressField(input);
}

async function handleOcrFileSelection(fileInput){
  const file = fileInput.files && fileInput.files[0];
  if(!file){
    return;
  }

  try{
    let resolvedList = [];

    try{
      const payload = await requestServerOcr(file);
      resolvedList = Array.isArray(payload.addresses) ? payload.addresses.filter(Boolean) : [];
      if(!resolvedList.length && payload.raw_text){
        resolvedList = parseAddressList(payload.raw_text);
      }
    }catch(serverError){
      const bestAttempt = await runBestOcrForFile(file);
      resolvedList = bestAttempt.candidates.length
        ? bestAttempt.candidates
        : (bestAttempt.addressLikeLines.length ? bestAttempt.addressLikeLines : bestAttempt.lines);
      if(!resolvedList.length){
        throw serverError;
      }
    }
    if(!resolvedList.length){
      alert("사진에서 주소 목록을 읽지 못했습니다.");
      return;
    }
    applyOcrAddresses(resolvedList);
    openOcrModal(resolvedList);
  }catch(error){
    alert(error.message || "사진에서 주소 목록을 읽지 못했습니다.");
  }finally{
    fileInput.value = "";
  }
}

ocrCameraInput.addEventListener("change", async () => {
  await handleOcrFileSelection(ocrCameraInput);
});

ocrGalleryInput.addEventListener("change", async () => {
  await handleOcrFileSelection(ocrGalleryInput);
});

ocrCancelBtn.addEventListener("click", () => {
  closeOcrModal();
});

ocrApplyBtn.addEventListener("click", () => {
  const addresses = Array.from(new Set(parseAddressList(ocrAddressList.value)));
  if(!addresses.length){
    alert("적용할 주소를 한 줄 이상 입력해 주세요.");
    return;
  }

  applyOcrAddresses(addresses);
  closeOcrModal();
});

ocrConfirmModal.addEventListener("click", (event) => {
  if(event.target === ocrConfirmModal){
    closeOcrModal();
  }
});

if(ocrPageBtn){
  ocrPageBtn.addEventListener("click", openOcrCapture);
}
if(ocrGalleryBtn){
  ocrGalleryBtn.addEventListener("click", openOcrGallery);
}

function showWarning(card){
  const warning = card.querySelector(".warning");
  if(warning) warning.style.display = "block";
}

function clearWarning(card){
  const name = card.querySelector('input[name="name"]');
  const address = card.querySelector('input[name="address"]');
  const hiddenFlag = card.querySelector('input[name="has_appointment_flag"]');
  const hourEl = card.querySelector('select[name="visit_hour"]');
  const minuteEl = card.querySelector('select[name="visit_minute"]');
  const warning = card.querySelector(".warning");

  const hasAppointment = hiddenFlag && hiddenFlag.value === "1";
  const baseOk = name.value.trim() && address.value.trim();
  const timeOk = !hasAppointment || (hourEl.value && minuteEl.value);

  if(baseOk && timeOk){
    warning.style.display = "none";
    name.classList.remove("error");
    address.classList.remove("error");
    hourEl.classList.remove("error");
    minuteEl.classList.remove("error");
  }
}

function validateForm(e){
  let hasError = false;

  document.querySelectorAll(".card").forEach(card => {
    const name = card.querySelector('input[name="name"]');
    const address = card.querySelector('input[name="address"]');
    const hiddenFlag = card.querySelector('input[name="has_appointment_flag"]');
    const hourEl = card.querySelector('select[name="visit_hour"]');
    const minuteEl = card.querySelector('select[name="visit_minute"]');

    let localError = false;

    name.classList.remove("error");
    address.classList.remove("error");
    hourEl.classList.remove("error");
    minuteEl.classList.remove("error");

    if(!name.value.trim()){
      name.classList.add("error");
      localError = true;
    }

    if(!address.value.trim()){
      address.classList.add("error");
      localError = true;
    }

    const hasAppointment = hiddenFlag.value === "1";
    if(hasAppointment){
      if(!hourEl.value){
        hourEl.classList.add("error");
        localError = true;
      }
      if(!minuteEl.value){
        minuteEl.classList.add("error");
        localError = true;
      }
    }

    if(localError){
      showWarning(card);
      hasError = true;
    }else{
      clearWarning(card);
    }
  });

  if(hasError){
    e.preventDefault();
    return false;
  }

  saveDraft();
  return true;
}

function bindDraftEvents(scope){
  scope.querySelectorAll('input[name="name"], select[name="service_time"], select[name="visit_hour"], select[name="visit_minute"]').forEach(el => {
    el.addEventListener("input", saveDraft);
    el.addEventListener("change", saveDraft);
  });

  scope.querySelectorAll('input[name="address"]').forEach(input => {
    input.addEventListener("focus", () => openAddressField(input));
    input.addEventListener("click", (event) => {
      event.preventDefault();
      openAddressField(input);
    });
  });

  const checkbox = scope.querySelector(".appointment-toggle");
  if(checkbox){
    checkbox.addEventListener("change", saveDraft);
  }
}

function saveDraft(){
  const cards = document.querySelectorAll(".card");
  const draft = [];

  cards.forEach(card => {
    const name = card.querySelector('input[name="name"]')?.value || "";
    const address = card.querySelector('input[name="address"]')?.value || "";
    const service = card.querySelector('select[name="service_time"]')?.value || "5";
    const checkbox = card.querySelector('.appointment-toggle');
    const hasAppt = checkbox ? checkbox.checked : false;
    const hour = card.querySelector('select[name="visit_hour"]')?.value || "";
    const minute = card.querySelector('select[name="visit_minute"]')?.value || "";

    draft.push({ name, address, service, hasAppt, hour, minute });
  });

  sessionStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
}

function restoreDraft(){
  const raw = sessionStorage.getItem(DRAFT_KEY);
  if(!raw) return false;

  let draft;
  try{
    draft = JSON.parse(raw);
  }catch{
    return false;
  }

  if(!Array.isArray(draft) || draft.length === 0) return false;

  visitContainer.innerHTML = "";
  count = 0;

  draft.forEach(item => {
    addVisit();
    const card = visitContainer.lastElementChild;

    const nameEl = card.querySelector('input[name="name"]');
    const addrEl = card.querySelector('input[name="address"]');
    const svcEl = card.querySelector('select[name="service_time"]');
    const checkbox = card.querySelector('.appointment-toggle');
    const hiddenFlag = card.querySelector('input[name="has_appointment_flag"]');
    const timeArea = card.querySelector(".time-select-area");
    const hourEl = card.querySelector('select[name="visit_hour"]');
    const minEl = card.querySelector('select[name="visit_minute"]');

    if(nameEl) nameEl.value = item.name || "";
    if(addrEl) addrEl.value = item.address || "";
    if(svcEl) svcEl.value = item.service || "5";

    if(checkbox) checkbox.checked = !!item.hasAppt;
    if(hiddenFlag) hiddenFlag.value = item.hasAppt ? "1" : "0";
    if(timeArea) timeArea.style.display = item.hasAppt ? "block" : "none";

    if(hourEl) hourEl.value = item.hour || "";
    if(minEl) minEl.value = item.minute || "";
  });

  updateDeleteButtons();
  return true;
}

form.addEventListener("submit", function(e){
  if(!validateForm(e)){
    return false;
  }

  document.getElementById("loadingOverlay").style.display = "flex";
  document.getElementById("submitBtn").disabled = true;
});

window.addEventListener("DOMContentLoaded", () => {
  const restored = restoreDraft();
  if(!restored){
    addVisit();
  }
  refreshOcrButtons();
});
</script>
</body>
</html>
