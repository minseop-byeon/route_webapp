<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>관리자 설정</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.container{

width:800px;
margin:60px auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);

}

h1{
margin-bottom:20px;
}

textarea{

width:100%;
height:300px;
padding:15px;
font-size:14px;

}

button{

margin-top:20px;
padding:14px 30px;
background:#007bff;
color:white;
border:none;
cursor:pointer;

}

button:hover{

background:#0056b3;

}

</style>

</head>


<body>

<div class="container">

<h1>국세청 체납관리단 관리자 설정</h1>

<form action="/save_settings" method="post">

<textarea name="settings">{{settings}}</textarea>

<br>

<button type="submit">설정 저장</button>

</form>

</div>

</body>

</html>
