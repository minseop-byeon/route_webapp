<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 설정</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    body {
      font-family: Pretendard, sans-serif;
      background: #f4f6fa;
      margin: 0;
      color: #111827;
    }
    .wrap {
      max-width: 860px;
      margin: 28px auto;
      padding: 0 16px 40px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .topbar a {
      text-decoration: none;
      font-size: 13px;
      color: #374151;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
    }
    h1 {
      margin: 0 0 18px;
      font-size: 24px;
    }
    h2 {
      margin: 22px 0 10px;
      font-size: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      margin-bottom: 12px;
      font-family: Pretendard, sans-serif;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .msg {
      margin-bottom: 12px;
      font-size: 13px;
      color: #16a34a;
      font-weight: 700;
    }
    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: -6px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 13px;
      background: #1d4ed8;
      color: white;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }
    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a href="/">← 시작 화면</a>
      <a href="/admin/logout">로그아웃</a>
    </div>

    <div class="card">
      <h1>관리자 설정</h1>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="msg">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}

      <form method="POST">
        <h2>메일 설정</h2>

        <label for="default_recipient_email">기본 발송 주소</label>
        <input type="email" id="default_recipient_email" name="default_recipient_email" value="{{ settings.default_recipient_email }}">

        <label for="email_subject_template">메일 제목 템플릿</label>
        <input type="text" id="email_subject_template" name="email_subject_template" value="{{ settings.email_subject_template }}">

        <label for="email_body_template">메일 본문 템플릿</label>
        <textarea id="email_body_template" name="email_body_template">{{ settings.email_body_template }}</textarea>
        <div class="hint">
          사용 가능 변수: {team_no}, {user_name}, {trip_date}, {total_count}, {total_distance}, {total_time}, {end_time}
        </div>

        <h2>API 키 설정</h2>
        <div class="grid">
          <div>
            <label for="client_id">Client ID</label>
            <input type="text" id="client_id" name="client_id" value="{{ settings.client_id }}">
          </div>
          <div>
            <label for="client_secret">Client Secret</label>
            <input type="text" id="client_secret" name="client_secret" value="{{ settings.client_secret }}">
          </div>
        </div>

        <h2>드롭다운 목록 설정</h2>
        <div class="grid">
          <div>
            <label for="team_options">조 목록 (한 줄에 하나)</label>
            <textarea id="team_options" name="team_options">{% for item in settings.team_options %}{{ item }}
{% endfor %}</textarea>
          </div>
          <div>
            <label for="user_options">이름 목록 (한 줄에 하나)</label>
            <textarea id="user_options" name="user_options">{% for item in settings.user_options %}{{ item }}
{% endfor %}</textarea>
          </div>
        </div>

        <button type="submit">설정 저장</button>
      </form>
    </div>
  </div>
</body>
</html>
