<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/symbol.png') }}">
<title>국세청 체납관리단 - 방문지 그룹화</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  --mobile-top-safe:calc(env(safe-area-inset-top, 0px) + 18px);
  --krds-primary:#1d4ed8;
  --krds-primary-strong:#1e40af;
  --krds-bg:#f4f6fa;
  --krds-border:#d8e2f0;
  --krds-text:#111827;
  --krds-sub:#64748b;
  --krds-danger:#ef4444;
}
*{box-sizing:border-box;}
body{margin:0;font-family:Pretendard,sans-serif;background:var(--krds-bg);color:var(--krds-text);min-height:100vh;position:relative;}
body::before{content:"";position:fixed;top:0;left:0;right:0;height:var(--mobile-top-safe);background:linear-gradient(180deg, rgba(244,246,250,.98) 0%, rgba(244,246,250,.88) 72%, rgba(244,246,250,0) 100%);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);pointer-events:none;z-index:1200;opacity:0;}
.container{max-width:420px;margin:34px auto;padding:0 16px 28px;}
.hero{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}
.hero-left{display:flex;align-items:center;gap:10px;}
.hero-logo{width:54px;height:54px;object-fit:contain;}
.hero-title{font-size:20px;font-weight:900;color:#003675;line-height:1.05;}
.hero-sub{font-size:12px;font-weight:800;color:var(--krds-sub);}
.hero-menu{width:48px;height:48px;border:none;background:transparent;color:#334155;}
.section-title{margin:0 0 10px;font-size:22px;font-weight:900;letter-spacing:-0.03em;}
.section-desc{margin:0 0 16px;font-size:13px;line-height:1.55;color:var(--krds-sub);font-weight:700;}
.summary-card,.card{background:#fff;border:1px solid var(--krds-border);border-radius:20px;box-shadow:0 10px 24px rgba(15,23,42,.05);}
.summary-card{padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.summary-label{font-size:12px;color:#64748b;font-weight:800;}
.summary-value{font-size:24px;font-weight:900;color:#0f172a;}
.summary-unit{font-size:13px;font-weight:800;color:#475569;margin-left:3px;}
.card{padding:16px 14px 14px;margin-bottom:12px;}
.card-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;}
.card-index{font-size:14px;font-weight:900;color:#1d4ed8;}
.delete-btn{border:none;background:transparent;color:#94a3b8;font-size:18px;cursor:pointer;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
label{font-size:12px;color:#64748b;font-weight:800;}
.required::after{content:" *";color:var(--krds-danger);}
input,select,button{font-family:Pretendard,sans-serif;}
input,select{width:100%;height:44px;padding:0 12px;border:1px solid #d4dce7;border-radius:12px;background:#f8fafd;color:#0f172a;font-size:14px;font-weight:600;}
input:focus,select:focus{outline:none;border-color:#5779b4;background:#fff;box-shadow:0 0 0 3px rgba(87,121,180,.12);}
.address-row{display:flex;gap:8px;}
.address-row input{flex:1;pointer-events:none;background:#f8fafc;}
.address-row button{width:96px;}
.btn{height:44px;border-radius:12px;border:1px solid transparent;font-size:14px;font-weight:900;cursor:pointer;}
.btn-primary{background:var(--krds-primary);border-color:var(--krds-primary);color:#fff;}
.btn-primary:hover{background:var(--krds-primary-strong);border-color:var(--krds-primary-strong);}
.btn-secondary{background:#fff;border-color:#d4dce7;color:#334155;}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.full-btn{width:100%;margin-top:8px;}
.warning{display:none;margin-top:10px;font-size:13px;color:var(--krds-danger);font-weight:800;}
.global-warning{margin-bottom:12px;padding:11px 12px;border-radius:14px;background:#fff4eb;border:1px solid #ffcfa1;color:#9a3412;font-size:13px;font-weight:800;line-height:1.5;}
.bottom-actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;}
.link-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:42px;padding:0 14px;border-radius:12px;border:1px solid #dbe2ea;background:#fff;color:#1f2937;font-size:14px;font-weight:800;text-decoration:none;}
.ocr-modal{position:fixed;inset:0;background:rgba(17,24,39,.65);display:none;align-items:center;justify-content:center;z-index:10000;padding:18px;}
.ocr-modal.show{display:flex;}
.ocr-modal-card{width:min(100%,620px);background:#fff;border:1px solid var(--krds-border);border-radius:18px;padding:18px;}
.ocr-modal-title{margin:0;font-size:20px;font-weight:800;color:#111827;}
.ocr-modal-desc{margin:8px 0 12px;font-size:13px;color:var(--krds-sub);font-weight:600;}
.ocr-modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;}
.qr-reader{width:100%;min-height:260px;border-radius:14px;overflow:hidden;background:#111827;border:1px solid #d2d8e0;}
.qr-help{margin:10px 0 0;font-size:12px;color:#5b6678;line-height:1.5;font-weight:600;}
@media (max-width:560px){
  body::before{opacity:1;}
  .container{margin:calc(var(--mobile-top-safe) + 16px) auto 0;padding:0 14px 24px;}
  .hero-logo{width:48px;height:48px;}
  .hero-title{font-size:18px;}
  .hero-sub{font-size:11px;}
  .actions{grid-template-columns:1fr;}
  .bottom-actions{flex-direction:column;}
  .link-btn,.btn{width:100%;}
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-left">
      <img class="hero-logo" src="{{ url_for('static', filename='images/symbol.png') }}" alt="국세청 심볼">
      <div>
        <div class="hero-title">국세청 체납관리단</div>
        <div class="hero-sub">SMART WORK</div>
      </div>
    </div>
    <button type="button" class="hero-menu" aria-label="메뉴">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
      </svg>
    </button>
  </div>

  <h1 class="section-title">방문지 그룹화</h1>
  <p class="section-desc">QR 스캔 또는 수동 입력으로 이름과 주소를 모은 뒤, 가까운 주소끼리 5개에서 10개 단위로 그룹화합니다.</p>

  {% if warning_message %}
    <div class="global-warning">{{ warning_message }}</div>
  {% endif %}

  <div class="summary-card">
    <div>
      <div class="summary-label">현재 목록 수</div>
      <div class="summary-value"><span id="visitCountValue">0</span><span class="summary-unit">건</span></div>
    </div>
    <div>
      <div class="summary-label">그룹당 개수</div>
      <select id="groupSizeDisplay" name="group_size_display" form="groupingForm">
        {% for value in range(5, 11) %}
          <option value="{{ value }}" {% if value == group_size %}selected{% endif %}>{{ value }}개</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <form id="groupingForm" method="POST">
    <input type="hidden" name="group_size" id="groupSizeInput" value="{{ group_size }}">
    <div id="visits"></div>

    <div class="actions">
      <button type="button" class="btn btn-secondary" id="qrScanBtn">QR 스캔 추가</button>
      <button type="button" class="btn btn-secondary" id="addVisitBtn">+ 목록 추가</button>
    </div>

    <button type="submit" class="btn btn-primary full-btn">그룹화하기</button>
  </form>

  <div class="bottom-actions">
    <a class="link-btn" href="{{ url_for('phone_menu') }}">전화 메뉴로 돌아가기</a>
    <a class="link-btn" href="{{ url_for('start') }}">시작화면으로 돌아가기</a>
  </div>
</div>

<div class="ocr-modal" id="qrScanModal">
  <div class="ocr-modal-card">
    <h3 class="ocr-modal-title">QR 스캔</h3>
    <p class="ocr-modal-desc">QR 코드를 촬영하여 이름과 주소를 자동으로 채웁니다.</p>
    <div id="qrReader" class="qr-reader"></div>
    <p class="qr-help">· 이미 등록된 주소는 중복 추가되지 않습니다.<br>· 주소 형식이 맞지 않으면 자동 제외됩니다.</p>
    <div class="ocr-modal-actions">
      <button type="button" class="btn btn-secondary" id="qrScanCloseBtn">닫기</button>
    </div>
  </div>
</div>

<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
const visitContainer = document.getElementById("visits");
const visitCountValue = document.getElementById("visitCountValue");
const qrScanBtn = document.getElementById("qrScanBtn");
const addVisitBtn = document.getElementById("addVisitBtn");
const qrScanModal = document.getElementById("qrScanModal");
const qrScanCloseBtn = document.getElementById("qrScanCloseBtn");
const qrReader = document.getElementById("qrReader");
const groupSizeDisplay = document.getElementById("groupSizeDisplay");
const groupSizeInput = document.getElementById("groupSizeInput");
const isMobileClient = window.matchMedia("(max-width: 760px)").matches || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
let qrScanner = null;
let qrScannerRunning = false;
let qrProcessing = false;

function normalizeAddressKey(address){
  return (address || "").replace(/\s+/g, " ").trim();
}

function updateVisitSummary(){
  visitCountValue.textContent = document.querySelectorAll(".group-visit-card").length.toString();
}

function renumber(){
  document.querySelectorAll(".group-visit-card").forEach((card, idx) => {
    const index = card.querySelector(".card-index");
    if(index){
      index.textContent = String(idx + 1).padStart(2, "0");
    }
  });
  updateVisitSummary();
}

function addVisit(item = {}){
  const div = document.createElement("div");
  div.className = "card group-visit-card";
  div.innerHTML = `
    <div class="card-head">
      <div class="card-index">00</div>
      <button type="button" class="delete-btn" aria-label="삭제">✕</button>
    </div>
    <div class="field">
      <label class="required">성명</label>
      <input type="text" name="name" value="${item.name || ""}">
    </div>
    <div class="field">
      <label class="required">주소</label>
      <div class="address-row">
        <input type="text" name="address" value="${item.address || ""}" readonly tabindex="0">
        <button type="button" class="btn btn-secondary">검색</button>
      </div>
    </div>
    <div class="warning">입력되지 않은 항목이 있습니다</div>
  `;
  visitContainer.appendChild(div);
  div.querySelector(".delete-btn").addEventListener("click", () => {
    div.remove();
    renumber();
  });
  const addressInput = div.querySelector('input[name="address"]');
  const openSearch = () => openAddressField(addressInput);
  div.querySelector(".address-row").addEventListener("click", (event) => {
    event.preventDefault();
    openSearch();
  });
  div.querySelector(".btn.btn-secondary").addEventListener("click", openSearch);
  addressInput.addEventListener("focus", openSearch);
  renumber();
}

function openAddressField(input){
  if(!input || input.dataset.addressPopupOpen === "1"){
    return;
  }
  input.dataset.addressPopupOpen = "1";
  new daum.Postcode({
    oncomplete(data){
      input.value = data.address;
      input.dataset.addressPopupOpen = "0";
    },
    onclose(){
      input.dataset.addressPopupOpen = "0";
    }
  }).open();
}

function parseQrPayload(rawText){
  let text = (rawText || "").trim().replace(/\uFEFF/g, "");
  if(/^RT1%7C/i.test(text)){
    try{
      text = decodeURIComponent(text);
    }catch(error){
    }
  }
  text = text.replace(/[\r\n]+/g, "");
  if(!text.startsWith("RT1|")){
    throw new Error(`지원하지 않는 QR 형식입니다.\n인식값: ${text.slice(0, 80) || "(비어 있음)"}`);
  }
  const pairs = text.split("|").slice(1).filter(Boolean);
  if(!pairs.length){
    throw new Error("QR 코드에 항목이 없습니다.");
  }
  return pairs.slice(0, 40).map((pair) => {
    const separator = pair.indexOf("^");
    if(separator <= 0){
      throw new Error("QR 코드 항목 형식이 올바르지 않습니다.");
    }
    return {
      name: pair.slice(0, separator).trim(),
      address: pair.slice(separator + 1).trim(),
    };
  });
}

async function requestQrResolution(items){
  const response = await fetch("/planner/resolve-qr-items", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({items})
  });
  const payload = await response.json();
  if(!response.ok || !payload.success){
    throw new Error(payload.message || "QR 데이터 확인 중 오류가 발생했습니다.");
  }
  return payload.items || [];
}

function addResolvedQrItems(items){
  const existingKeys = new Set(
    Array.from(document.querySelectorAll('input[name="address"]'))
      .map((input) => normalizeAddressKey(input.value))
      .filter(Boolean)
  );
  items.forEach((item) => {
    const resolvedAddress = item.display_address || item.address || "";
    const key = normalizeAddressKey(resolvedAddress || item.address);
    if(item.ok && key && existingKeys.has(key)){
      return;
    }
    addVisit({name: item.name || "", address: resolvedAddress || item.address || ""});
    if(key){
      existingKeys.add(key);
    }
  });
}

async function handleQrDecoded(decodedText){
  if(qrProcessing){
    return;
  }
  qrProcessing = true;
  try{
    const parsedItems = parseQrPayload(decodedText);
    const resolvedItems = await requestQrResolution(parsedItems);
    addResolvedQrItems(resolvedItems);
    await stopQrScanner();
    resetQrModalState();
    qrScanModal.classList.remove("show");
  }catch(error){
    alert(error.message || "QR 코드 처리 중 오류가 발생했습니다.");
  }finally{
    qrProcessing = false;
  }
}

async function startQrScanner(){
  if(qrScannerRunning || typeof Html5Qrcode === "undefined"){
    return;
  }
  qrScanner = qrScanner || new Html5Qrcode("qrReader");
  qrScannerRunning = true;
  await qrScanner.start(
    {facingMode: "environment"},
    {fps: 10, qrbox: {width: 220, height: 220}},
    async (decodedText) => {
      await stopQrScanner();
      await handleQrDecoded(decodedText);
    },
    () => {}
  );
}

async function stopQrScanner(){
  if(!qrScanner || !qrScannerRunning){
    return;
  }
  try{
    await qrScanner.stop();
    await qrScanner.clear();
  }catch(error){
  }finally{
    qrScannerRunning = false;
  }
}

function resetQrModalState(){
  qrReader.innerHTML = "";
}

qrScanBtn.addEventListener("click", async () => {
  qrScanModal.classList.add("show");
  try{
    await startQrScanner();
  }catch(error){
    qrScanModal.classList.remove("show");
    alert(error.message || "카메라를 시작하지 못했습니다.");
  }
});

qrScanCloseBtn.addEventListener("click", async () => {
  await stopQrScanner();
  resetQrModalState();
  qrScanModal.classList.remove("show");
});

qrScanModal.addEventListener("click", async (event) => {
  if(event.target === qrScanModal){
    await stopQrScanner();
    resetQrModalState();
    qrScanModal.classList.remove("show");
  }
});

groupSizeDisplay.addEventListener("change", () => {
  groupSizeInput.value = groupSizeDisplay.value;
});

addVisitBtn.addEventListener("click", () => addVisit());

document.getElementById("groupingForm").addEventListener("submit", (event) => {
  const cards = Array.from(document.querySelectorAll(".group-visit-card"));
  let validCount = 0;
  cards.forEach((card) => {
    const name = card.querySelector('input[name="name"]').value.trim();
    const address = card.querySelector('input[name="address"]').value.trim();
    const warning = card.querySelector(".warning");
    const hasError = !name || !address;
    warning.style.display = hasError ? "block" : "none";
    if(!hasError){
      validCount += 1;
    }
  });
  if(validCount === 0){
    event.preventDefault();
    alert("최소 1개의 주소를 입력해 주세요.");
    return;
  }
  if(validCount > 40){
    event.preventDefault();
    alert("방문지 그룹화는 최대 40개까지 가능합니다.");
    return;
  }
});

window.addEventListener("DOMContentLoaded", () => {
  if(isMobileClient){
    qrScanBtn.style.display = "inline-flex";
  }
  addVisit();
});
</script>
</body>
</html>
