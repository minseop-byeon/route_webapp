<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/symbol.png') }}">
<title>국세청 체납관리단 - 전화 메뉴</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  --mobile-top-safe:calc(env(safe-area-inset-top, 0px) + 18px);
  --krds-primary:#1d4ed8;
  --krds-primary-strong:#1e40af;
  --krds-bg:#f4f6fa;
  --krds-border:#d8e2f0;
  --krds-text:#111827;
  --krds-sub:#64748b;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Pretendard,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(29,78,216,.08), transparent 24%),
    linear-gradient(180deg, #f7faff 0%, var(--krds-bg) 100%);
  color:var(--krds-text);
  min-height:100vh;
  position:relative;
}
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:var(--mobile-top-safe);
  background:linear-gradient(180deg, rgba(244,246,250,.98) 0%, rgba(244,246,250,.88) 72%, rgba(244,246,250,0) 100%);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  pointer-events:none;
  z-index:1200;
  opacity:0;
}
.container{max-width:420px;margin:36px auto;padding:0 16px 28px;}
.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
}
.hero-left{display:flex;align-items:center;gap:10px;}
.hero-logo{width:54px;height:54px;object-fit:contain;}
.hero-title{font-size:22px;font-weight:900;color:#003675;line-height:1.06;}
.hero-sub{font-size:13px;font-weight:800;color:var(--krds-sub);}
.menu-trigger{
  width:48px;
  height:48px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:none;
  background:transparent;
  color:#334155;
  cursor:default;
  padding:0;
  flex:0 0 auto;
}
.menu-trigger svg{width:24px;height:24px;display:block;}
.menu-grid{display:grid;gap:12px;}
.menu-link{
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:156px;
  text-decoration:none;
  color:inherit;
  background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
  border:1px solid #dbe6f4;
  border-radius:22px;
  padding:18px 16px 16px;
  box-shadow:0 12px 24px rgba(15,23,42,.05);
}
.menu-link:hover{border-color:#bfd1ee;background:#fff;}
.menu-link-title{font-size:20px;font-weight:900;color:#0f172a;letter-spacing:-0.03em;}
.menu-link-text{
  margin-top:8px;
  font-size:15px;
  line-height:1.6;
  color:#64748b;
  font-weight:700;
  white-space:pre-line;
}
.menu-link-arrow{
  align-self:flex-end;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:36px;
  height:36px;
  border-radius:999px;
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#2563eb;
  box-shadow:0 8px 16px rgba(37,99,235,.12);
}
.menu-link-arrow svg{width:18px;height:18px;display:block;}
.back-row{margin-top:16px;}
.back-link{
  display:inline-flex;
  align-items:center;
  gap:6px;
  height:40px;
  border-radius:999px;
  border:1px solid transparent;
  background:transparent;
  color:#64748b;
  padding:0 4px;
  font-size:13px;
  font-weight:700;
  text-decoration:none;
}
.back-link:hover{color:#334155;text-decoration:underline;}
@media (max-width:560px){
  body::before{opacity:1;}
  .container{margin:calc(var(--mobile-top-safe) + 16px) auto 0;padding:0 14px 24px;}
  .hero-logo{width:48px;height:48px;}
  .hero-title{font-size:18px;}
  .hero-sub{font-size:11px;}
  .menu-trigger{width:44px;height:44px;}
  .menu-link{min-height:148px;border-radius:20px;padding:17px 14px 14px;}
  .menu-link-title{font-size:18px;}
  .menu-link-text{font-size:14px;}
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-left">
      <img class="hero-logo" src="{{ url_for('static', filename='images/symbol.png') }}" alt="국세청 심볼">
      <div>
        <div class="hero-title">국세청 체납관리단</div>
        <div class="hero-sub">SMART WORK</div>
      </div>
    </div>

    <button type="button" class="menu-trigger" aria-label="메뉴">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
      </svg>
    </button>
  </div>

  <div class="menu-grid">
    <a class="menu-link" href="{{ url_for('phone_grouping') }}">
      <div>
        <div class="menu-link-title">방문지 그룹화</div>
        <div class="menu-link-text">대량의 방문지를 입력하고,
동선을 고려하여 그룹화합니다.</div>
      </div>
      <div class="menu-link-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M8 12h8M13 7l5 5-5 5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
    </a>

    <a class="menu-link" href="{{ url_for('planner') }}">
      <div>
        <div class="menu-link-title">최적경로계산</div>
        <div class="menu-link-text">방문지 주소에 맞춰
최적의 동선을 계산합니다.</div>
      </div>
      <div class="menu-link-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M8 12h8M13 7l5 5-5 5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
    </a>
  </div>

  <div class="back-row">
    <a class="back-link" href="{{ url_for('start') }}">시작화면으로 돌아가기</a>
  </div>
</div>
</body>
</html>
