name: CI and Render Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m compileall -q app.py

      - name: Flask import smoke test
        run: |
          python -c "import app; print('app import ok')"

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is empty; skipping deploy hook trigger."
            exit 0
          fi
          success=0
          for i in 1 2 3; do
            code=$(curl --show-error --silent --output /dev/null --write-out "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
            if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
              echo "Render deploy hook accepted: HTTP $code"
              success=1
              break
            fi
            echo "Render deploy hook attempt $i failed: HTTP $code"
            sleep 2
          done
          if [ "$success" -ne 1 ]; then
            echo "Render deploy hook did not return success after retries."
          fi
